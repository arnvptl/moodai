name: MoodAI Worker

on:
  workflow_dispatch:

jobs:
  run-moodai:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 google-genai

      - name: Verify installation
        run: |
          python --version
          pip list
          python -c "from google import genai; print('google-genai installed successfully')"

      - name: Run MoodAI worker
        env:
          MOODLE_USERNAME: ${{ secrets.MOODLE_USERNAME }}
          MOODLE_PASSWORD: ${{ secrets.MOODLE_PASSWORD }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: python moodai/auto.py
