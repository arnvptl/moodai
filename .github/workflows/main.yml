name: MoodAI Worker

on:
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  run-moodai:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # Runs for maximum allowed time (6 hours) to satisfy the 3 hours minimum
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 google-generativeai
          
      - name: Run MoodAI worker
        env:
          MOODLE_USERNAME: ${{ secrets.MOODLE_USERNAME }}
          MOODLE_PASSWORD: ${{ secrets.MOODLE_PASSWORD }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: python moodai/auto.py
